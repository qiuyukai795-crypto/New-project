spring:
  datasource:
    url: jdbc:h2:mem:dianping_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 0
