spring:
  datasource:
    url: jdbc:h2:mem:dianping_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
app:
  security:
    frontend-base-url: http://localhost:5173
    providers:
      github:
        enabled: true
      local:
        enabled: true
    jwt:
      secret: test-secret-key-test-secret-key-123456
      expires-in: 2h

server:
  port: 0
