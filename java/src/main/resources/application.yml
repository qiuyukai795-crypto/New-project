spring:
  config:
    import:
      - optional:file:./application-local.yml
      - optional:file:./java/application-local.yml
  application:
    name: dianping-java-api
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:dianping_demo}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8&useUnicode=true
    username: ${DB_USERNAME:dianping}
    password: ${DB_PASSWORD:dianping123}
  sql:
    init:
      mode: always
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
  cache:
    type: redis
    redis:
      cache-null-values: false
      time-to-live: 10m
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
app:
  security:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    jwt:
      secret: ${APP_JWT_SECRET:change-this-demo-secret-change-this-demo-secret-2026}
      expires-in: ${APP_JWT_EXPIRES_IN:2h}

server:
  port: 8080
